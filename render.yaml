services:
  - type: web
    name: cloud-url-shortener-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run prisma:generate && npm run prisma:push && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 10000
      - key: BASE_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: cloud-url-shortener-db
          property: connectionString

  - type: psql
    name: cloud-url-shortener-db
    plan: free
    ipAllowList: []
